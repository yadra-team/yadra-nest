name: Bug report
description: Report a reproducible defect.
title: "bug: "
labels: ["type: bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use Discussions for questions or uncertain behavior. Use this form only when you can describe a defect.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - workspace/docs
        - app/frontend
        - service/backend
        - AI/model
        - infrastructure
        - security/privacy
        - unknown
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version, commit, or environment
      placeholder: v0.1.0, commit SHA, OS/browser/runtime
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I removed secrets, tokens, credentials, and private user data.
          required: true

